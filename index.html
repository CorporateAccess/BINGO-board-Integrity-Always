<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrity Bingo</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
        }

        h1 { color: #524388; margin-bottom: 20px; text-align: center; }

        /* ตารางแบบยืดหยุ่น (Responsive) */
        table { 
            border-collapse: separate; 
            border-spacing: 5px; 
            background: white; 
            border-radius: 15px; 
            padding: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            border: 3px solid #524388;
            width: 100%;
            max-width: 500px; /* จำกัดขนาดไม่ให้ใหญ่เกินไปในคอม */
        }

        td {
            /* ใช้ vmin เพื่อให้ช่องตารางเป็นจัตุรัสและปรับตามหน้าจอที่แคบกว่า */
            width: 18vw; 
            height: 18vw;
            max-width: 90px;
            max-height: 90px;
            border: 2px solid #524388;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            color: #524388;
            cursor: pointer;
            font-size: 3vw; /* ปรับขนาดตัวอักษรตามจอ */
            padding: 2px;
        }
        
        @media (min-width: 500px) {
            td { font-size: 14px; }
        }

        td:hover { background-color: #f0f0f0; }
        td.marked { background-color: #524388 !important; color: white; border-color: #F1921E; }
        
        .free-space { border: none !important; background: transparent !important; cursor: default; }
        .free-space img { width: 80%; height: 80%; border-radius: 50%; border: 3px solid #F1921E; }

        #bingoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); display: none;
            justify-content: center; align-items: center; z-index: 10;
        }
    </style>
</head>
<body>

    <h1>INTEGRITY BINGO</h1>
    <table id="bingoTable"></table>
    
    <div id="bingoOverlay" onclick="this.style.display='none'">
        <div style="font-size: 50px; color: #524388; font-weight: bold;">BINGO!</div>
    </div>

    <script>
        const allWords = [
            "ซื่อสัตย์", "จริงใจ", "โปร่งใส", "ซื่อตรง", "ตรงไปตรงมา", "สุจริต", "ความถูกต้อง", "รักษาคำพูด", "เที่ยงตรง", "น่าเชื่อถือ", 
            "ไม่โกง", "ไว้ใจได้", "มั่นคง", "รับผิดชอบ", "ตรวจสอบได้", "สัจจะ", "เป็นคนดี", "ยุติธรรม", "คุณธรรม", "ไม่โกหก", 
            "ชัดเจน", "เชื่อใจ", "เปิดเผย", "ขยัน", "ครบถ้วน", "ถูกต้อง", "ตรงต่อเวลา", "เคารพกฎ", "เคารพหน้าที่", "สม่ำเสมอ", 
            "มีวินัย", "กล้าหาญ", "อดทน", "เสียสละ", "เมตตา", "เห็นอกเห็นใจ", "ให้เกียรติ", "เคารพกัน", "สามัคคี", "ร่วมมือ", 
            "ตั้งใจ", "มุ่งมั่น", "ทุ่มเท", "รับฟัง", "ใจกว้าง", "รอบคอบ", "พัฒนา", "เรียนรู้", "ความจริง", "ความโปร่งใส", 
            "ความรับผิดชอบ", "ความน่าเชื่อถือ", "ความยุติธรรม", "ความไว้วางใจ", "ความซื่อตรง", "ความมุ่งมั่น", "ความสม่ำเสมอ", "ความเคารพ", "ความร่วมมือ", "ความเมตตา", 
            "Sincere", "Honest", "Transparency", "Trustworthy", "Accountability", "Ethical", "Integrity", "Fair", "Truth", "Reliable", 
            "Responsible", "Authenticity", "Commitment", "Dedication", "Uprightness", "Probity", "Principle", "Respect", "Empathy", "Consistency"
        ];

        function createBingo() {
            const table = document.getElementById('bingoTable');
            let shuffled = [...allWords].sort(() => 0.5 - Math.random()).slice(0, 24);
            
            for (let i = 0; i < 5; i++) {
                let row = table.insertRow();
                for (let j = 0; j < 5; j++) {
                    let cell = row.insertCell();
                    if (i === 2 && j === 2) {
                        cell.className = 'free-space marked';
                        cell.innerHTML = '<img src="image_bc9682.png" alt="Logo">';
                    } else {
                        cell.innerHTML = shuffled.pop();
                        cell.onclick = function() { this.classList.toggle('marked'); checkBingo(); };
                    }
                }
            }
        }

        function checkBingo() {
            const grid = Array.from(document.querySelectorAll('td')).map(c => c.classList.contains('marked'));
            let isBingo = false;
            for (let i = 0; i < 5; i++) {
                if ([0,1,2,3,4].every(j => grid[i*5 + j]) || [0,1,2,3,4].every(j => grid[j*5 + i])) isBingo = true;
            }
            if ([0,6,12,18,24].every(i => grid[i]) || [4,8,12,16,20].every(i => grid[i])) isBingo = true;
            document.getElementById('bingoOverlay').style.display = isBingo ? 'flex' : 'none';
        }
        createBingo();
    </script>
</body>
</html>
